<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark:  '#0d4a4f',
              mint:  '#7fdfd0',
              light: '#e6f7f5',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-light via-white to-teal-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="pingwa_logo.png" alt="PingWA logo" class="h-32 w-32 rounded-2xl shadow-md" />
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <p class="text-gray-500 text-sm leading-relaxed mb-6">
        Start a WhatsApp message to any number
        <span class="font-semibold text-brand-dark">without saving it to your contacts</span>.
        Type or paste the full international number below.
      </p>

      <!-- Input + button -->
      <div class="flex gap-2">
        <div class="relative flex-1">
          <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
          </span>
          <input
            id="phone"
            type="text"
            inputmode="tel"
            placeholder="+1 555 123 4567"
            autocomplete="off"
            class="w-full pl-9 pr-3 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-brand-mint transition-colors"
          />
        </div>
        <button
          onclick="go()"
          class="px-6 py-3 bg-brand-dark hover:bg-teal-800 active:scale-95 text-white font-semibold rounded-xl transition-all text-sm shadow-sm"
        >
          Go
        </button>
      </div>

      <!-- Error message -->
      <div id="error" class="hidden mt-4 flex items-start gap-2 text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
        <span id="error-text"></span>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">No data stored. No accounts needed.</p>
  </div>

  <script>
    document.getElementById("phone").addEventListener("keydown", function (e) {
      if (e.key === "Enter") go();
    });

    function go() {
      const raw = document.getElementById("phone").value;
      const errorBox = document.getElementById("error");
      const errorText = document.getElementById("error-text");

      errorBox.classList.add("hidden");

      // Reject anything that isn't digits, +, or spaces
      if (/[^\d+\s]/.test(raw.trim())) {
        showError("Invalid characters detected. Please enter only digits, spaces, and an optional leading +.");
        return;
      }

      const stripped = raw.trim().replace(/\s+/g, "");
      const match = stripped.match(/^(\+?)(\d+)$/);

      if (!match) {
        showError("Could not parse a valid phone number. Please include the country code, e.g. +1 555 123 4567.");
        return;
      }

      const digits = match[2];

      if (digits.length < 7) {
        showError("The number seems too short. Please include the country code.");
        return;
      }

      const fullNumber = match[1] + digits;
      window.open("https://wa.me/" + encodeURIComponent(fullNumber), "_blank");

      function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
